<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="coin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="60%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
  </defs>

  <!-- outer ring -->
  <circle cx="16" cy="16" r="15" fill="url(#coin)" stroke="#B8860B" stroke-width="1.5"/>

  <!-- inner circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#E6A700" stroke-width="1"/>

  <!-- Z symbol -->
  <text x="16" y="21"
        font-family="Verdana, Arial"
        font-size="14"
        font-weight="bold"
        text-anchor="middle"
        fill="#ffffff">
        Z
  </text>
</svg>
